<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Guess The Number</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="../style.css">
</head>
<body style="background-color: grey; color: aliceblue;">
    <div id="wrapper">
        <h1>Number Guessing Game</h1>
        <p>Try and Guess rANDOM Number between 1 and 100.</p>
        <p>You have 10 attempts to Guess the Right Number.</p>
        <br>
        <form class="form">
            <label for="guessfield" id="guess">guess a number</label>
            <input type="text" id="guessfield" class="guessfield">
            <input type="submit" id="subt" value="Submit guess" class="guessfield">
        </form>

        <div class="resultParas">
            <p>Previous Guesses: <span class="guesses"></span></p>
            <p>Guesses Remaining: <span class="LastResult"></span></p>
            <p class="lowOrHi"></p>
        </div>

    </div>
    <script src="GTN.js"></script>

</body>
</html>
